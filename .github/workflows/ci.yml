name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --cwd apps/api --frozen-lockfile
      - run: bun install --cwd apps/web --frozen-lockfile
      - run: cd apps/api && bun run lint
      - run: cd apps/web && bun run lint

  test-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --cwd apps/api --frozen-lockfile
      - run: cd apps/api && bun run test

  test-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --cwd apps/web --frozen-lockfile
      - run: cd apps/web && bun run test
