name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: actions/cache@v4
        with:
          path: |
            apps/api/node_modules
            apps/web/node_modules
          key: bun-${{ hashFiles('apps/api/bun.lockb', 'apps/web/bun.lockb') }}
          restore-keys: bun-
      - run: bun install --cwd apps/api --frozen-lockfile
      - run: bun install --cwd apps/web --frozen-lockfile
      - run: cd apps/api && bun run lint
      - run: cd apps/web && bun run lint
      - run: cd apps/web && bun run test

  test-api:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: evee
        ports:
          - 4210:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:4210/evee
      JWT_SECRET: dev-secret-change-in-production
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: actions/cache@v4
        with:
          path: apps/api/node_modules
          key: bun-api-${{ hashFiles('apps/api/bun.lockb') }}
          restore-keys: bun-api-
      - run: bun install --cwd apps/api --frozen-lockfile
      - run: cd apps/api && bunx drizzle-kit migrate
      - run: cd apps/api && bun run test

  deploy-api:
    needs: [check, test-api]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: |
            ghcr.io/0x63616c/evee-api:latest
            ghcr.io/0x63616c/evee-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
      - run: gem install kamal
      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: '${{ secrets.VPS_SSH_KEY }}'
      - name: Write Kamal secrets
        run: |
          mkdir -p .kamal
          cat > .kamal/secrets <<EOF
          KAMAL_REGISTRY_PASSWORD=${{ secrets.GHCR_TOKEN }}
          DATABASE_URL=${{ secrets.DATABASE_URL }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          OPENROUTER_API_KEY=${{ secrets.OPENROUTER_API_KEY }}
          POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
          GRAFANA_ADMIN_PASSWORD=${{ secrets.GRAFANA_ADMIN_PASSWORD }}
          POSTGRES_EXPORTER_DSN=${{ secrets.POSTGRES_EXPORTER_DSN }}
          EOF
      - run: kamal env push -c config/deploy.api.yml
      - run: kamal deploy -P -c config/deploy.api.yml

  deploy-web:
    needs: [check]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: |
            ghcr.io/0x63616c/evee-web:latest
            ghcr.io/0x63616c/evee-web:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
      - run: gem install kamal
      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: '${{ secrets.VPS_SSH_KEY }}'
      - name: Write Kamal secrets
        run: |
          mkdir -p .kamal
          cat > .kamal/secrets <<EOF
          KAMAL_REGISTRY_PASSWORD=${{ secrets.GHCR_TOKEN }}
          EOF
      - run: kamal deploy -P -c config/deploy.web.yml
