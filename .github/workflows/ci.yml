name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --cwd apps/api --frozen-lockfile
      - run: bun install --cwd apps/web --frozen-lockfile
      - run: cd apps/api && bun run lint
      - run: cd apps/web && bun run lint

  test-api:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: evee
        ports:
          - 4210:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:4210/evee
      JWT_SECRET: dev-secret-change-in-production
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --cwd apps/api --frozen-lockfile
      - run: cd apps/api && bunx drizzle-kit migrate
      - run: cd apps/api && bun run test

  test-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --cwd apps/web --frozen-lockfile
      - run: cd apps/web && bun run test

  deploy-api:
    needs: [lint, test-api]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
      - run: gem install kamal
      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: '${{ secrets.VPS_SSH_KEY }}'
      - run: kamal deploy -c config/deploy.api.yml
        env:
          KAMAL_REGISTRY_PASSWORD: ${{ secrets.GHCR_TOKEN }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}

  deploy-web:
    needs: [lint, test-web]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
      - run: gem install kamal
      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: '${{ secrets.VPS_SSH_KEY }}'
      - run: kamal deploy -c config/deploy.web.yml
        env:
          KAMAL_REGISTRY_PASSWORD: ${{ secrets.GHCR_TOKEN }}
