service: evee-api
image: 0x63616c/evee-api

servers:
  web:
    hosts:
      - 46.225.220.11

proxy:
  ssl: true
  host: api.worldwidewebb.co
  app_port: 4201
  response_timeout: 300
  healthcheck:
    path: /healthz
    interval: 3

registry:
  server: ghcr.io
  username: "0x63616c"
  password:
    - KAMAL_REGISTRY_PASSWORD

builder:
  arch: amd64
  dockerfile: apps/api/Dockerfile
  context: .

env:
  clear:
    PORT: 4201
    SIGNUP_ENABLED: "false"
  secret:
    - DATABASE_URL
    - JWT_SECRET
    - OPENROUTER_API_KEY

accessories:
  postgres:
    image: postgres:16-alpine
    host: 46.225.220.11
    port: "127.0.0.1:5432:5432"
    env:
      clear:
        POSTGRES_USER: postgres
        POSTGRES_DB: evee
      secret:
        - POSTGRES_PASSWORD
    directories:
      - data:/var/lib/postgresql/data

ssh:
  user: deploy

hooks_path: .kamal/hooks
