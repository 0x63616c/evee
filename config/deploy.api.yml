service: evee-api
image: 0x63616c/evee-api

servers:
  web:
    hosts:
      - 46.225.220.11

proxy:
  ssl: true
  host: api.worldwidewebb.co
  app_port: 4201
  response_timeout: 300
  healthcheck:
    path: /healthz
    interval: 3

registry:
  server: ghcr.io
  username: "0x63616c"
  password:
    - KAMAL_REGISTRY_PASSWORD

builder:
  arch: amd64
  dockerfile: apps/api/Dockerfile
  context: .

env:
  clear:
    PORT: 4201
    SIGNUP_ENABLED: "false"
  secret:
    - DATABASE_URL
    - JWT_SECRET
    - OPENROUTER_API_KEY

accessories:
  postgres:
    image: postgres:16-alpine
    host: 46.225.220.11
    port: "127.0.0.1:5432:5432"
    env:
      clear:
        POSTGRES_USER: postgres
        POSTGRES_DB: evee
      secret:
        - POSTGRES_PASSWORD
    directories:
      - data:/var/lib/postgresql/data

  prometheus:
    image: prom/prometheus:latest
    host: 46.225.220.11
    port: "127.0.0.1:9090:9090"
    cmd: "--config.file=/etc/prometheus/prometheus.yml --storage.tsdb.retention.time=0d"
    files:
      - config/monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    directories:
      - prometheus-data:/prometheus

  grafana:
    image: grafana/grafana:latest
    host: 46.225.220.11
    proxy:
      ssl: true
      host: grafana.worldwidewebb.co
      app_port: 3000
      healthcheck:
        path: /api/health
        interval: 5
    env:
      clear:
        GF_SECURITY_ADMIN_USER: admin
        GF_USERS_ALLOW_SIGN_UP: "false"
        GF_USERS_ALLOW_ORG_CREATE: "false"
        GF_AUTH_ANONYMOUS_ENABLED: "false"
        GF_SERVER_ROOT_URL: "https://grafana.worldwidewebb.co"
      secret:
        - GRAFANA_ADMIN_PASSWORD
    files:
      - config/monitoring/grafana/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml
      - config/monitoring/grafana/dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml
      - config/monitoring/grafana/dashboards/evee-overview.json:/var/lib/grafana/dashboards/evee-overview.json
    directories:
      - grafana-data:/var/lib/grafana

  loki:
    image: grafana/loki:latest
    host: 46.225.220.11
    port: "127.0.0.1:3100:3100"
    cmd: "-config.file=/etc/loki/local-config.yaml"
    files:
      - config/monitoring/loki/loki-config.yml:/etc/loki/local-config.yaml
    directories:
      - loki-data:/loki

  promtail:
    image: grafana/promtail:latest
    host: 46.225.220.11
    port: "127.0.0.1:9080:9080"
    cmd: "-config.file=/etc/promtail/config.yml"
    files:
      - config/monitoring/promtail/promtail-config.yml:/etc/promtail/config.yml
    options:
      volume:
        - /var/run/docker.sock:/var/run/docker.sock:ro
        - /var/lib/docker/containers:/var/lib/docker/containers:ro

  node-exporter:
    image: prom/node-exporter:latest
    host: 46.225.220.11
    port: "127.0.0.1:9100:9100"
    cmd: "--path.rootfs=/host"
    options:
      pid: host
      volume:
        - /proc:/host/proc:ro
        - /sys:/host/sys:ro
        - /:/host:ro,rslave

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    host: 46.225.220.11
    port: "127.0.0.1:8080:8080"
    options:
      privileged: true
      volume:
        - /:/rootfs:ro
        - /var/run:/var/run:ro
        - /sys:/sys:ro
        - /var/lib/docker/:/var/lib/docker:ro
        - /dev/disk/:/dev/disk:ro

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    host: 46.225.220.11
    port: "127.0.0.1:9187:9187"
    env:
      secret:
        - POSTGRES_EXPORTER_DSN

ssh:
  user: deploy

hooks_path: .kamal/hooks
