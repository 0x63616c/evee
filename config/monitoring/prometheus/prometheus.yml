global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: node-exporter
    static_configs:
      - targets: ["evee-api-node-exporter:9100"]

  - job_name: cadvisor
    static_configs:
      - targets: ["evee-api-cadvisor:8080"]

  - job_name: postgres-exporter
    static_configs:
      - targets: ["evee-api-postgres-exporter:9187"]

  - job_name: evee-api
    static_configs:
      - targets: ["evee-api:4201"]
    metrics_path: /metrics
