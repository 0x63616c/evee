# Only print failures — suppress banner, summary, and skipped-file noise
output:
  - failure

pre-commit:
  parallel: true
  commands:
    biome:
      glob: "**/*.{ts,tsx,js,jsx,json,jsonc}"
      run: ./apps/api/node_modules/.bin/biome check --write --no-errors-on-unmatched --files-ignore-unknown=true {staged_files}
      stage_fixed: true
    check-rls:
      glob: "apps/api/src/db/schema.ts"
      run: |
        for f in {staged_files}; do
          PG=$(grep -c 'pgTable(' "$f" 2>/dev/null || true)
          RLS=$(grep -c '\.enableRLS()' "$f" 2>/dev/null || true)
          if [ "$PG" != "$RLS" ]; then
            echo "ERROR: $PG pgTable() calls but $RLS .enableRLS() in $f — use publicTable() for shared tables or add .enableRLS() for user-scoped tables"
            exit 1
          fi
        done
