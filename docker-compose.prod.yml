services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?}
      POSTGRES_DB: ${POSTGRES_DB:-evee}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrate:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    command: ["sh", "-c", "bunx drizzle-kit migrate && bun run src/db/seed.ts"]
    environment:
      DATABASE_URL: ${DATABASE_URL:?}
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    environment:
      SERVICE_FQDN_API_4201: https://api.worldwidewebb.co
      DATABASE_URL: ${DATABASE_URL:?}
      JWT_SECRET: ${JWT_SECRET:?}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      PORT: 4201
    depends_on:
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:4201/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:?}
    environment:
      SERVICE_FQDN_WEB: https://evee.worldwidewebb.co
    depends_on:
      - api

volumes:
  pgdata:
